<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - الإعدادات</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config={
theme:{
extend:{
colors:{
gold:'#e94560',
success:'#00d09c'
}
}
}
}
</script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}


body{
background:#0b1120;
}


.glass{

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.1);

}


.gold-gradient{

background:linear-gradient(135deg,#e94560,#ff6b6b);

}


input{

outline:none;

}

</style>


</head>




<body class="text-white min-h-screen">






<header class="glass p-5 flex justify-between items-center">


<h1 class="text-3xl font-black">

Smart <span class="text-gold">X</span>

</h1>



<a href="dashboard.html">

⬅ العودة

</a>


</header>








<main class="max-w-xl mx-auto p-5">





<h2 class="text-3xl font-bold mb-6">

⚙️ إعدادات الحساب

</h2>







<div class="glass rounded-3xl p-7">







<div class="text-center mb-6">


<div class="w-24 h-24 rounded-full bg-white/10 mx-auto flex items-center justify-center text-5xl">

👤

</div>


<p class="mt-3 text-gray-300">

الصورة الشخصية

</p>


</div>









<label>

الاسم الكامل

</label>


<input

id="name"

class="w-full p-4 mt-2 mb-4 rounded-xl bg-white/10"

>







<label>

رقم الهاتف

</label>


<input

id="phone"

class="w-full p-4 mt-2 mb-4 rounded-xl bg-white/10"

>







<label>

البريد الإلكتروني

</label>


<input

id="email"

readonly

class="w-full p-4 mt-2 mb-4 rounded-xl bg-white/10"

>








<label>

كلمة المرور الجديدة

</label>


<input

id="password"

type="password"

placeholder="اتركها فارغة إذا لا تريد التغيير"

class="w-full p-4 mt-2 mb-6 rounded-xl bg-white/10"

>









<button

onclick="saveSettings()"

class="w-full py-4 rounded-xl gold-gradient font-bold">

حفظ التعديلات

</button>





</div>







</main>








<script>



let user =

JSON.parse(localStorage.getItem("smartUser"));





let users =

JSON.parse(localStorage.getItem("smartUsers")) || [];







if(!user){

window.location="login.html";

}







document.getElementById("name").value=user.name;

document.getElementById("phone").value=user.phone;

document.getElementById("email").value=user.email;









function saveSettings(){



let name=

document.getElementById("name").value;


let phone=

document.getElementById("phone").value;


let password=

document.getElementById("password").value;







let index=

users.findIndex(u=>u.id===user.id);






if(index!==-1){


users[index].name=name;

users[index].phone=phone;



if(password){

users[index].password=password;

}



user=users[index];



localStorage.setItem(

"smartUsers",

JSON.stringify(users)

);



localStorage.setItem(

"smartUser",

JSON.stringify(user)

);



alert("تم تحديث البيانات");



}


}




</script>





</body>

</html>
