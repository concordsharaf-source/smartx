<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - إنشاء حساب</title>


<script src="https://cdn.tailwindcss.com"></script>


<script>

tailwind.config={
theme:{
extend:{
colors:{
gold:'#e94560',
success:'#00d09c'
}
}
}
}

</script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');


*{
font-family:'Cairo',sans-serif;
}


body{

background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);

}


.glass{

background:rgba(255,255,255,.1);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.1);

}


.gold-gradient{

background:linear-gradient(135deg,#e94560,#ff6b6b);

}


input{

outline:none;

}

</style>


</head>





<body class="min-h-screen text-white flex items-center justify-center px-5">







<div class="w-full max-w-md">





<div class="text-center mb-6">


<h1 class="text-5xl font-black">

Smart

<span class="text-gold">

X

</span>

</h1>


<p class="text-gray-300 mt-3">

إنشاء حساب جديد

</p>


</div>









<div class="glass rounded-3xl p-8">





<h2 class="text-2xl font-bold text-center mb-6">

تسجيل عضو

</h2>








<input id="name"

placeholder="الاسم الكامل"

class="w-full p-4 mb-3 rounded-xl bg-white/10">







<input id="phone"

placeholder="رقم الهاتف"

type="tel"

class="w-full p-4 mb-3 rounded-xl bg-white/10">







<input id="email"

placeholder="البريد الإلكتروني"

type="email"

class="w-full p-4 mb-3 rounded-xl bg-white/10">








<input id="username"

placeholder="اسم المستخدم"

class="w-full p-4 mb-3 rounded-xl bg-white/10">








<input id="password"

placeholder="كلمة المرور"

type="password"

class="w-full p-4 mb-3 rounded-xl bg-white/10">








<input id="confirm"

placeholder="تأكيد كلمة المرور"

type="password"

class="w-full p-4 mb-3 rounded-xl bg-white/10">







<input id="ref"

placeholder="كود الدعوة (اختياري)"

class="w-full p-4 mb-6 rounded-xl bg-white/10">







<button

onclick="register()"

class="w-full py-4 rounded-xl gold-gradient font-bold text-lg">

إنشاء الحساب

</button>








<p class="text-center mt-6">


لديك حساب؟


<a href="login.html"

class="text-success font-bold">

دخول

</a>


</p>





</div>






</div>









<script>




// قراءة كود الدعوة من الرابط



let params =

new URLSearchParams(window.location.search);



let urlRef =

params.get("ref");



if(urlRef){

document.getElementById("ref").value=urlRef;

}









function register(){





let name =

document.getElementById("name").value.trim();


let phone =

document.getElementById("phone").value.trim();


let email =

document.getElementById("email").value.trim();


let username =

document.getElementById("username").value.trim();


let password =

document.getElementById("password").value;


let confirm =

document.getElementById("confirm").value;


let ref =

document.getElementById("ref").value.trim();








if(!name || !phone || !email || !username || !password){

alert("أكمل جميع البيانات");

return;

}






if(password !== confirm){

alert("كلمتا المرور غير متطابقتين");

return;

}








let users =

JSON.parse(localStorage.getItem("smartUsers")) || [];








let exists = users.find(u =>

u.username===username ||

u.email===email

);





if(exists){

alert("اسم المستخدم أو البريد مستخدم مسبقًا");

return;

}







let inviteCode =

"SMART-" +

Math.floor(10000 + Math.random()*90000);









let newUser={


id:Date.now(),


name:name,


phone:phone,


email:email,


username:username,


password:password,


balance:0,


points:0,


inviteCode:inviteCode,


invitedBy:ref,


status:"نشط",


created:new Date().toLocaleDateString("ar")


};








users.push(newUser);








localStorage.setItem(

"smartUsers",

JSON.stringify(users)

);








alert("تم إنشاء الحساب بنجاح");


window.location="login.html";





}



</script>





</body>

</html>
