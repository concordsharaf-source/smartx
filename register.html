<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - إنشاء حساب</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

input{
outline:none;
}

</style>

</head>


<body class="min-h-screen text-white flex items-center justify-center p-5">


<div class="w-full max-w-md">


<div class="text-center mb-6">

<h1 class="text-5xl font-black">
Smart <span class="text-red-400">X</span>
</h1>

<p class="mt-3 text-gray-300">
إنشاء حساب جديد
</p>

</div>



<div class="glass rounded-3xl p-7">


<input id="name"
placeholder="الاسم الكامل"
class="w-full p-4 mb-3 rounded-xl bg-white/10">


<input id="phone"
placeholder="رقم الهاتف"
class="w-full p-4 mb-3 rounded-xl bg-white/10">


<input id="username"
placeholder="اسم المستخدم"
class="w-full p-4 mb-3 rounded-xl bg-white/10">


<input id="email"
type="email"
placeholder="البريد الإلكتروني"
class="w-full p-4 mb-3 rounded-xl bg-white/10">


<input id="password"
type="password"
placeholder="كلمة المرور"
class="w-full p-4 mb-3 rounded-xl bg-white/10">


<input id="confirm"
type="password"
placeholder="تأكيد كلمة المرور"
class="w-full p-4 mb-3 rounded-xl bg-white/10">


<input id="ref"
placeholder="كود الدعوة (اختياري)"
class="w-full p-4 mb-6 rounded-xl bg-white/10">



<button onclick="register()"
class="w-full py-4 rounded-xl gold font-bold">

إنشاء الحساب

</button>



<p class="text-center mt-5">

لديك حساب؟

<a href="login.html" class="text-green-400">
دخول
</a>

</p>


</div>


</div>





<script type="module">


import { auth, db } from "./firebase.js";


import { 
createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





function generateCode(){

return "SMART-" + Math.floor(10000 + Math.random()*90000);

}





window.register = async function(){



let name =
document.getElementById("name").value;


let phone =
document.getElementById("phone").value;


let username =
document.getElementById("username").value;


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;


let confirm =
document.getElementById("confirm").value;


let ref =
document.getElementById("ref").value;




if(password !== confirm){

alert("كلمتا المرور غير متطابقتين");
return;

}



try{


let userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);



let uid =
userCredential.user.uid;



let inviteCode =
generateCode();



await setDoc(
doc(db,"users",uid),
{

name:name,

phone:phone,

username:username,

email:email,

inviteCode:inviteCode,

invitedBy:ref,

balance:0,

points:0,

createdAt:new Date()

}

);



alert("تم إنشاء الحساب بنجاح");


window.location="login.html";



}

catch(error){


alert(error.message);


}



}


</script>



</body>

</html>
