<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - لوحة العضو</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

</style>

</head>


<body class="text-white min-h-screen">


<header class="glass p-5 flex justify-between items-center">


<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>


<button onclick="logout()" class="text-red-300">
خروج
</button>


</header>





<main class="max-w-5xl mx-auto p-5">



<h2 class="text-3xl font-bold mb-6">

مرحباً 👋

<span id="username"></span>

</h2>




<div class="grid md:grid-cols-3 gap-5">



<div class="glass rounded-3xl p-6">

<p>
الرصيد
</p>

<h2 class="text-4xl text-green-400 font-bold">

$<span id="balance">0</span>

</h2>

</div>




<div class="glass rounded-3xl p-6">

<p>
النقاط
</p>

<h2 class="text-4xl text-yellow-400 font-bold">

<span id="points">0</span>

</h2>

</div>




<div class="glass rounded-3xl p-6">

<p>
كود الإحالة
</p>

<h2 id="code" class="text-xl text-red-400 font-bold">
-
</h2>

</div>



</div>






<!-- أزرار الخدمات -->

<div class="grid md:grid-cols-2 gap-4 mt-6">


<a href="deposit.html"

class="gold text-center p-5 rounded-3xl font-bold">

💰 طلب إيداع

</a>



<button

class="glass p-5 rounded-3xl font-bold">

💸 طلب سحب

</button>


</div>






<div class="glass rounded-3xl p-6 mt-6">


<h2 class="text-2xl font-bold mb-4">
بيانات الحساب
</h2>



<p>
📧 البريد:
<span id="email"></span>
</p>



<p class="mt-3">
📱 الهاتف:
<span id="phone"></span>
</p>



</div>




</main>







<script type="module">


import {auth,db} from "./firebase.js";


import {

onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}



let snap=await getDoc(

doc(db,"users",user.uid)

);



if(snap.exists()){


let data=snap.data();



document.getElementById("username").innerHTML=data.name || "";

document.getElementById("balance").innerHTML=data.balance || 0;

document.getElementById("points").innerHTML=data.points || 0;

document.getElementById("code").innerHTML=data.inviteCode || "-";

document.getElementById("email").innerHTML=data.email || "";

document.getElementById("phone").innerHTML=data.phone || "";


}



});







window.logout=function(){


signOut(auth);


location="login.html";


}



</script>



</body>

</html>
