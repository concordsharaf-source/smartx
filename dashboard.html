<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - لوحة العضو</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
gold:'#e94560',
success:'#00d09c'
}
}
}
}
</script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}


body{

background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);

}


.glass{

background:rgba(255,255,255,.1);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.1);

}


.gold-gradient{

background:linear-gradient(135deg,#e94560,#ff6b6b);

}

</style>

</head>


<body class="text-white min-h-screen">



<header class="glass p-5 flex justify-between items-center">


<h1 class="text-3xl font-black">

سمارت

<span class="text-gold">

إكس

</span>

</h1>


<button onclick="logout()">

خروج

</button>


</header>





<main class="p-5 max-w-5xl mx-auto">



<div class="mb-6">


<h2 class="text-3xl font-bold">

مرحبًا <span id="name">عضو</span> 👋

</h2>


<p class="text-gray-400">

لوحة حسابك

</p>


</div>






<!-- الرصيد -->


<div class="glass rounded-3xl p-7">


<p class="text-gray-400">

الرصيد الحالي

</p>


<h1 class="text-5xl font-black mt-3">

$<span id="balance">0</span>

</h1>


<div class="text-success mt-3">

▲ +2.45% اليوم

</div>


</div>







<!-- البطاقات -->


<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">



<div class="glass rounded-2xl p-5">

<p class="text-gray-400">

النقاط

</p>

<h2 class="text-3xl font-bold text-gold">

<span id="points">

0

</span>

</h2>

</div>





<div class="glass rounded-2xl p-5">

<p class="text-gray-400">

المستوى

</p>

<h2 class="text-3xl font-bold">

مبتدئ

</h2>

</div>





<div class="glass rounded-2xl p-5">

<p>

📈

</p>

<p>

التداول

</p>

</div>





<div class="glass rounded-2xl p-5">

<p>

💰

</p>

<p>

المحفظة

</p>

</div>



</div>







<!-- كود الدعوة -->


<div class="glass rounded-3xl p-6 mt-6">


<h2 class="text-xl font-bold">

كود الدعوة

</h2>



<div class="bg-black/30 rounded-xl p-4 mt-4 text-center text-2xl text-success font-bold">


<span id="code">

SMART-0000

</span>


</div>



<p class="text-gray-400 mt-3">

شارك الكود واحصل على نقاط

</p>


</div>






<!-- العمليات -->


<div class="glass rounded-3xl p-6 mt-6">


<h2 class="text-xl font-bold mb-4">

آخر العمليات

</h2>



<div class="flex justify-between border-b border-white/10 py-3">

<span>

فتح الحساب

</span>

<span class="text-success">

تم

</span>

</div>



<div class="flex justify-between py-3">

<span>

مكافأة التسجيل

</span>

<span class="text-gold">

+50 نقطة

</span>

</div>



</div>



</main>







<script>


let user = JSON.parse(localStorage.getItem("smartUser"));



if(user){


document.getElementById("name").innerHTML=user.name;


document.getElementById("balance").innerHTML=user.balance;


document.getElementById("points").innerHTML=user.points;


document.getElementById("code").innerHTML=user.code;


}

else{


window.location="login.html";


}





function logout(){


localStorage.clear();

window.location="index.html";


}



</script>



</body>

</html>
