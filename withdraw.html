<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - السحب</title>

<script src="https://cdn.tailwindcss.com"></script>


<script>

tailwind.config={
theme:{
extend:{
colors:{
gold:'#e94560',
success:'#00d09c'
}
}
}
}

</script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');


*{
font-family:'Cairo',sans-serif;
}


body{
background:#0b1120;
}


.glass{

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.1);

}


.gold-gradient{

background:linear-gradient(135deg,#e94560,#ff6b6b);

}


input,select{

outline:none;

}


</style>


</head>




<body class="text-white min-h-screen">






<header class="glass p-5 flex justify-between items-center">


<h1 class="text-3xl font-black">

Smart

<span class="text-gold">

X

</span>

</h1>



<a href="wallet.html">

⬅ العودة

</a>


</header>







<main class="max-w-xl mx-auto p-5">





<h2 class="text-3xl font-bold mb-6">

📤 طلب سحب

</h2>







<div class="glass rounded-3xl p-7">







<div class="mb-6 p-4 rounded-xl bg-white/10">


<p class="text-gray-400">

الرصيد الحالي

</p>


<h2 class="text-3xl font-bold text-success">

$<span id="balance">

0

</span>

</h2>


</div>









<label class="block mb-2">

طريقة السحب

</label>


<select

id="method"

class="w-full p-4 mb-5 rounded-xl bg-white/10 text-white">


<option>

تحويل بنكي

</option>


<option>

محفظة إلكترونية

</option>


<option>

عملات رقمية

</option>


</select>









<label class="block mb-2">

المبلغ المطلوب

</label>


<input

id="amount"

type="number"

placeholder="مثال: 200"

class="w-full p-4 mb-5 rounded-xl bg-white/10"

>









<label class="block mb-2">

بيانات الاستلام

</label>


<input

id="account"

type="text"

placeholder="رقم الحساب أو المحفظة"

class="w-full p-4 mb-5 rounded-xl bg-white/10"

>








<button

onclick="sendWithdraw()"

class="w-full py-4 rounded-xl gold-gradient font-bold text-lg">

إرسال طلب السحب

</button>





</div>








<div class="glass rounded-3xl p-6 mt-6">


<h3 class="text-xl font-bold mb-4">

شروط السحب

</h3>


<ul class="text-gray-300 space-y-2">


<li>
✓ تتم مراجعة الطلب من الإدارة
</li>


<li>
✓ قد يستغرق التنفيذ وقتًا حسب الطريقة
</li>


<li>
✓ يجب أن تكون بيانات الاستلام صحيحة
</li>


</ul>


</div>





</main>








<script>


let user =

JSON.parse(localStorage.getItem("smartUser"));



if(user){

document.getElementById("balance").innerHTML=user.balance;

}








function sendWithdraw(){



let amount =

Number(document.getElementById("amount").value);



let method =

document.getElementById("method").value;



let account =

document.getElementById("account").value;







if(!amount || !account){


alert("أكمل البيانات");

return;


}







if(user && amount > user.balance){


alert("الرصيد غير كافٍ");


return;


}







let withdrawals =

JSON.parse(localStorage.getItem("withdrawals")) || [];







let request={


id:Date.now(),

user:user ? user.username : "",

amount:amount,

method:method,

account:account,

status:"قيد المراجعة",

date:new Date().toLocaleDateString("ar")


};







withdrawals.push(request);







localStorage.setItem(

"withdrawals",

JSON.stringify(withdrawals)

);







alert("تم إرسال طلب السحب بنجاح");


window.location="wallet.html";



}



</script>



</body>

</html>
