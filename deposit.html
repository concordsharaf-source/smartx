<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - إيداع</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

input,select,textarea{
outline:none;
}

</style>

</head>



<body class="text-white min-h-screen">



<header class="glass p-5 flex justify-between items-center">


<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>


<a href="dashboard.html" class="text-green-400">
العودة
</a>


</header>





<main class="max-w-md mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
💰 طلب إيداع
</h2>




<div class="glass rounded-3xl p-6">



<input

id="amount"

type="number"

placeholder="مبلغ الإيداع"

class="w-full p-4 mb-4 rounded-xl bg-white/10"

>




<select

id="method"

class="w-full p-4 mb-4 rounded-xl bg-white/10 text-black">

<option value="">
اختر طريقة الدفع
</option>

<option>
تحويل بنكي
</option>

<option>
محفظة إلكترونية
</option>

<option>
أخرى
</option>


</select>





<textarea

id="note"

placeholder="ملاحظة أو رقم التحويل"

class="w-full p-4 mb-5 rounded-xl bg-white/10">

</textarea>






<button

onclick="sendDeposit()"

class="w-full py-4 rounded-xl gold font-bold">

إرسال طلب الإيداع

</button>



</div>



</main>






<script type="module">


import {auth,db} from "./firebase.js";


import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,

getDoc,

collection,

addDoc,

serverTimestamp

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





let currentUser=null;

let userData=null;





onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}


currentUser=user;



let snap=await getDoc(

doc(db,"users",user.uid)

);



if(snap.exists()){


userData=snap.data();


}



});







window.sendDeposit=async function(){



let amount=

Number(document.getElementById("amount").value);



let method=

document.getElementById("method").value;



let note=

document.getElementById("note").value;





if(amount<=0 || !method){


alert("أدخل البيانات المطلوبة");

return;

}




await addDoc(

collection(db,"deposits"),

{


userId:currentUser.uid,

name:userData.name,

email:userData.email,

amount:amount,

method:method,

note:note,

status:"pending",

date:serverTimestamp()


}


);





alert("تم إرسال طلب الإيداع بنجاح");


location="dashboard.html";



}





</script>




</body>

</html>
