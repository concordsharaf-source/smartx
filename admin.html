<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - لوحة المدير</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

</style>

</head>


<body class="text-white min-h-screen">


<header class="glass p-5 flex justify-between items-center">

<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>

<button onclick="logout()" class="text-red-300">
خروج
</button>

</header>





<main class="max-w-7xl mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
👑 لوحة المدير
</h2>



<h2 class="text-2xl font-bold mb-4">
طلبات الإيداع 💰
</h2>


<div id="deposits" class="space-y-4 mb-10">

</div>





<h2 class="text-2xl font-bold mb-4">
الأعضاء 👥
</h2>


<div id="users" class="space-y-5">

</div>



</main>







<script type="module">


import {auth,db} from "./firebase.js";



import {

onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,
getDoc,
collection,
getDocs,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";









onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}



let admin=await getDoc(

doc(db,"users",user.uid)

);



if(!admin.exists() || admin.data().role!="admin"){

location="dashboard.html";

return;

}



loadDeposits();

loadUsers();



});









async function loadDeposits(){


let box=document.getElementById("deposits");


box.innerHTML="";



let snap=await getDocs(

collection(db,"deposits")

);



snap.forEach((item)=>{


let d=item.data();


if(d.status=="pending"){



box.innerHTML += `


<div class="glass rounded-3xl p-5">


<h3 class="text-xl font-bold">

${d.name}

</h3>


<p>
💰 المبلغ: ${d.amount}
</p>


<p>
🏦 الطريقة: ${d.method}
</p>


<p>
📝 ${d.note || ""}
</p>



<div class="flex gap-3 mt-4">


<button

onclick="approveDeposit('${item.id}','${d.userId}',${d.amount})"

class="bg-green-600 p-3 rounded-xl">

قبول

</button>



<button

onclick="rejectDeposit('${item.id}')"

class="bg-red-600 p-3 rounded-xl">

رفض

</button>


</div>


</div>


`;

}


});



}









window.approveDeposit=async function(id,userId,amount){



let userRef=doc(db,"users",userId);


let userSnap=await getDoc(userRef);


let old=userSnap.data().balance || 0;



await updateDoc(userRef,{

balance:old+amount

});



await updateDoc(

doc(db,"deposits",id),

{

status:"approved"

}

);



alert("تم قبول الإيداع");


loadDeposits();


}










window.rejectDeposit=async function(id){


await updateDoc(

doc(db,"deposits",id),

{

status:"rejected"

}

);



alert("تم رفض الطلب");


loadDeposits();



}









async function loadUsers(){


let box=document.getElementById("users");


box.innerHTML="";


let snap=await getDocs(

collection(db,"users")

);



snap.forEach((item)=>{


let u=item.data();


box.innerHTML += `


<div class="glass rounded-3xl p-5">


<h2 class="text-xl font-bold">

${u.name || ""}

</h2>


<p>
📧 ${u.email || ""}
</p>


<p class="text-green-400">

💰 الرصيد: ${u.balance || 0}

</p>


<p class="text-yellow-400">

⭐ النقاط: ${u.points || 0}

</p>


</div>


`;



});


}









window.logout=function(){


signOut(auth);


location="login.html";


}



</script>


</body>

</html>
