<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - لوحة المدير</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.btn{
padding:12px;
border-radius:15px;
font-weight:bold;
}

</style>

</head>


<body class="text-white min-h-screen">



<header class="glass p-5 flex justify-between items-center">

<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>


<button onclick="logout()" class="text-red-300">
خروج
</button>


</header>





<main class="max-w-7xl mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
👑 لوحة المدير
</h2>




<h2 class="text-2xl font-bold mb-4">
طلبات الإيداع 💰
</h2>


<div id="deposits" class="space-y-4 mb-10">

</div>





<div class="glass rounded-3xl p-5 mb-6">


<h2 class="text-2xl font-bold mb-4">
بحث وترتيب الأعضاء 👥
</h2>



<input

id="search"

oninput="filterUsers()"

placeholder="ابحث بالاسم أو البريد أو الهاتف"

class="w-full p-4 rounded-xl bg-white/10 mb-4"



>



<select

id="sort"

onchange="filterUsers()"

class="w-full p-4 rounded-xl bg-white/10 text-black">


<option value="name">
ترتيب حسب الاسم
</option>


<option value="high">
أعلى رصيد
</option>


<option value="low">
أقل رصيد
</option>


</select>



</div>





<h2 class="text-2xl font-bold mb-4">
الأعضاء
</h2>


<div id="users" class="space-y-5"></div>



</main>





<script type="module">


import {auth,db} from "./firebase.js";


import {

onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,
getDoc,
getDocs,
collection,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



let allUsers=[];




onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}



let admin=await getDoc(

doc(db,"users",user.uid)

);



if(!admin.exists() || admin.data().role!="admin"){

location="dashboard.html";

return;

}



loadDeposits();

loadUsers();


});
async function loadDeposits(){


let box=document.getElementById("deposits");

box.innerHTML="";


let snap=await getDocs(collection(db,"deposits"));



snap.forEach((item)=>{


let d=item.data();



if(d.status=="pending"){



box.innerHTML+=`

<div class="glass rounded-3xl p-5">


<h3 class="text-xl font-bold">
${d.name || ""}
</h3>


<p>
💰 المبلغ: ${d.amount}
</p>


<p>
🏦 الطريقة: ${d.method}
</p>


<p>
📝 ${d.note || ""}
</p>



<div class="flex gap-3 mt-4">


<button onclick="approveDeposit('${item.id}','${d.userId}',${d.amount})"

class="bg-green-600 btn">

قبول

</button>



<button onclick="rejectDeposit('${item.id}')"

class="bg-red-600 btn">

رفض

</button>


</div>


</div>

`;



}


});


}








window.approveDeposit=async function(id,userId,amount){


let ref=doc(db,"users",userId);


let snap=await getDoc(ref);


await updateDoc(ref,{

balance:(snap.data().balance || 0)+amount

});



await updateDoc(doc(db,"deposits",id),{

status:"approved"

});


loadDeposits();

loadUsers();


}








window.rejectDeposit=async function(id){


await updateDoc(doc(db,"deposits",id),{

status:"rejected"

});


loadDeposits();


}









async function loadUsers(){


let box=document.getElementById("users");


let snap=await getDocs(collection(db,"users"));



allUsers=[];



snap.forEach((item)=>{


allUsers.push({

id:item.id,

...item.data()

});


});



filterUsers();


}









window.filterUsers=function(){


let box=document.getElementById("users");


let search=document.getElementById("search").value.toLowerCase();


let sort=document.getElementById("sort").value;



let users=[...allUsers];



users=users.filter((u)=>{


return (

(u.name || "").toLowerCase().includes(search)

||

(u.email || "").toLowerCase().includes(search)

||

String(u.phone || "").includes(search)

);


});





if(sort=="name"){


users.sort((a,b)=>(a.name||"").localeCompare(b.name||""));


}



if(sort=="high"){


users.sort((a,b)=>(b.balance||0)-(a.balance||0));


}



if(sort=="low"){


users.sort((a,b)=>(a.balance||0)-(b.balance||0));


}







box.innerHTML="";





users.forEach((u)=>{



box.innerHTML+=`


<div class="glass rounded-3xl p-6">


<h2 class="text-2xl font-bold">

${u.name || ""}

</h2>


<p>
📧 ${u.email || ""}
</p>


<p>
📱 الهاتف: ${u.phone || "غير موجود"}
</p>


<p class="text-green-400 mt-2">

💰 الرصيد: ${u.balance || 0}

</p>


<input id="balance${u.id}"

type="number"

placeholder="المبلغ"

class="w-full p-3 mt-3 rounded-xl bg-white/10">



<div class="grid grid-cols-2 gap-2 mt-3">


<button onclick="addBalance('${u.id}')"

class="bg-green-700 btn">

+ رصيد

</button>


<button onclick="minusBalance('${u.id}')"

class="bg-red-700 btn">

- رصيد

</button>


</div>





<p class="text-yellow-400 mt-5">

⭐ النقاط: ${u.points || 0}

</p>



<input id="points${u.id}"

type="number"

placeholder="النقاط"

class="w-full p-3 mt-3 rounded-xl bg-white/10">



<div class="grid grid-cols-2 gap-2 mt-3">


<button onclick="addPoints('${u.id}')"

class="bg-yellow-600 btn">

+ نقاط

</button>


<button onclick="minusPoints('${u.id}')"

class="bg-orange-700 btn">

- نقاط

</button>


</div>


</div>


`;



});



}









async function changeValue(id,field,value){


let ref=doc(db,"users",id);


let snap=await getDoc(ref);


let old=snap.data()[field] || 0;



await updateDoc(ref,{

[field]:old+value

});



loadUsers();


}








window.addBalance=function(id){


let v=Number(document.getElementById("balance"+id).value);


if(v>0)

changeValue(id,"balance",v);


}







window.minusBalance=function(id){


let v=Number(document.getElementById("balance"+id).value);


if(v>0)

changeValue(id,"balance",-v);


}






window.addPoints=function(id){


let v=Number(document.getElementById("points"+id).value);


if(v>0)

changeValue(id,"points",v);


}






window.minusPoints=function(id){


let v=Number(document.getElementById("points"+id).value);


if(v>0)

changeValue(id,"points",-v);


}






window.logout=function(){


signOut(auth);


location="login.html";


}



</script>


</body>

</html>
