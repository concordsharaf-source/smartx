<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - لوحة المدير</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config={
theme:{
extend:{
colors:{
gold:'#e94560',
success:'#00d09c'
}
}
}
}
</script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:#0b1120;
}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold-gradient{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

</style>


</head>


<body class="text-white min-h-screen">



<header class="glass p-5 flex justify-between items-center">

<h1 class="text-3xl font-black">
Smart <span class="text-gold">X</span>
</h1>


<button onclick="logout()" class="text-red-400">
خروج
</button>


</header>





<main class="max-w-7xl mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
👑 لوحة الإدارة
</h2>





<!-- الإحصائيات -->


<div class="grid md:grid-cols-4 grid-cols-2 gap-4 mb-8">


<div class="glass rounded-3xl p-5">
<p class="text-gray-400">الأعضاء</p>
<h2 id="usersCount" class="text-3xl font-bold">0</h2>
</div>


<div class="glass rounded-3xl p-5">
<p class="text-gray-400">الأرصدة</p>
<h2 id="totalMoney" class="text-3xl font-bold text-success">
0$
</h2>
</div>


<div class="glass rounded-3xl p-5">
<p class="text-gray-400">إيداعات معلقة</p>
<h2 id="depositCount" class="text-3xl font-bold text-gold">
0
</h2>
</div>


<div class="glass rounded-3xl p-5">
<p class="text-gray-400">سحوبات معلقة</p>
<h2 id="withdrawCount" class="text-3xl font-bold">
0
</h2>
</div>


</div>







<!-- الأعضاء -->


<div class="glass rounded-3xl p-6 mb-8">


<h2 class="text-2xl font-bold mb-5">
👥 الأعضاء
</h2>



<div class="overflow-x-auto">


<table class="w-full text-center">


<thead>

<tr class="border-b border-white/20">

<th class="p-3">الاسم</th>
<th>الهاتف</th>
<th>الرصيد</th>
<th>النقاط</th>
<th>التحكم</th>

</tr>

</thead>


<tbody id="usersTable">

</tbody>


</table>


</div>


</div>









<!-- الإيداعات -->


<div class="glass rounded-3xl p-6 mb-8">


<h2 class="text-2xl font-bold mb-5">
📥 طلبات الإيداع
</h2>


<div id="deposits"></div>


</div>








<!-- السحوبات -->


<div class="glass rounded-3xl p-6">


<h2 class="text-2xl font-bold mb-5">
📤 طلبات السحب
</h2>


<div id="withdrawals"></div>


</div>






</main>









<script>



let users =
JSON.parse(localStorage.getItem("smartUsers")) || [];


let deposits =
JSON.parse(localStorage.getItem("deposits")) || [];


let withdrawals =
JSON.parse(localStorage.getItem("withdrawals")) || [];







function load(){



let table=document.getElementById("usersTable");

table.innerHTML="";

let money=0;



users.forEach((u,i)=>{


money+=Number(u.balance);



table.innerHTML+=`

<tr class="border-b border-white/10">

<td class="p-3">
${u.name}
<br>
<span class="text-gray-400">
${u.username}
</span>
</td>


<td>
${u.phone}
</td>


<td class="text-success">
${u.balance}$
</td>


<td class="text-gold">
${u.points}
</td>


<td>


<button onclick="addBalance(${i})"
class="bg-green-600 px-3 py-2 rounded-xl">
+ رصيد
</button>


<button onclick="addPoints(${i})"
class="bg-yellow-600 px-3 py-2 rounded-xl">
+ نقاط
</button>


</td>


</tr>

`;

});


document.getElementById("usersCount").innerHTML=users.length;

document.getElementById("totalMoney").innerHTML=money+"$";


document.getElementById("depositCount").innerHTML=

deposits.filter(x=>x.status=="قيد المراجعة").length;


document.getElementById("withdrawCount").innerHTML=

withdrawals.filter(x=>x.status=="قيد المراجعة").length;



showDeposits();

showWithdrawals();


}








function addBalance(i){


let x=prompt("المبلغ");


if(x){

users[i].balance+=Number(x);

save();

}


}






function addPoints(i){


let x=prompt("النقاط");


if(x){

users[i].points+=Number(x);

save();

}


}







function save(){

localStorage.setItem(
"smartUsers",
JSON.stringify(users)
);

load();

}









function showDeposits(){


let box=document.getElementById("deposits");

box.innerHTML="";


deposits.forEach((d,i)=>{


box.innerHTML+=`

<div class="glass p-4 rounded-xl mb-3">

المبلغ:
${d.amount}$

<br>

الطريقة:
${d.method}


<br>

الحالة:
${d.status}


<br><br>


<button onclick="acceptDeposit(${i})"
class="bg-green-600 px-4 py-2 rounded-xl">
قبول
</button>


<button onclick="rejectDeposit(${i})"
class="bg-red-600 px-4 py-2 rounded-xl">
رفض
</button>


</div>

`;

});


}









function acceptDeposit(i){


deposits[i].status="مقبول";


saveAll();


}







function rejectDeposit(i){


deposits[i].status="مرفوض";


saveAll();


}








function showWithdrawals(){


let box=document.getElementById("withdrawals");

box.innerHTML="";


withdrawals.forEach((w,i)=>{


box.innerHTML+=`

<div class="glass p-4 rounded-xl mb-3">


المبلغ:
${w.amount}$

<br>

طريقة:
${w.method}


<br>

الحالة:
${w.status}


<br><br>


<button onclick="acceptWithdraw(${i})"
class="bg-green-600 px-4 py-2 rounded-xl">
قبول
</button>


<button onclick="rejectWithdraw(${i})"
class="bg-red-600 px-4 py-2 rounded-xl">
رفض
</button>


</div>


`;

});


}







function acceptWithdraw(i){

withdrawals[i].status="مقبول";

saveAll();

}




function rejectWithdraw(i){

withdrawals[i].status="مرفوض";

saveAll();

}







function saveAll(){


localStorage.setItem("deposits",JSON.stringify(deposits));

localStorage.setItem("withdrawals",JSON.stringify(withdrawals));


load();


}






function logout(){

window.location="index.html";

}



load();



</script>


</body>

</html>
