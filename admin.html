<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - لوحة المدير</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

</style>

</head>


<body class="text-white min-h-screen">


<header class="glass p-5 flex justify-between">

<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>


<button onclick="logout()" class="text-red-300">
خروج
</button>


</header>




<main class="max-w-6xl mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
👑 لوحة المدير
</h2>


<div id="status" class="mb-5 text-yellow-300">
جاري تحميل البيانات...
</div>


<div id="users" class="space-y-5"></div>


</main>





<script type="module">


import {auth,db} from "./firebase.js";


import {

onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,
getDoc,
collection,
getDocs,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







onAuthStateChanged(auth, async(user)=>{


if(!user){

document.getElementById("status").innerHTML="لم يتم تسجيل الدخول";

return;

}



try{


let adminDoc = await getDoc(
doc(db,"users",user.uid)
);



if(!adminDoc.exists()){

document.getElementById("status").innerHTML="بيانات الحساب غير موجودة";

return;

}



let adminData = adminDoc.data();



if(adminData.role !== "admin"){


document.getElementById("status").innerHTML="ليس لديك صلاحية مدير";

return;

}



document.getElementById("status").innerHTML="تم الدخول كمدير";


loadUsers();



}


catch(error){


document.getElementById("status").innerHTML=error.message;


}



});









async function loadUsers(){


let box=document.getElementById("users");


box.innerHTML="";


let result = await getDocs(
collection(db,"users")
);



result.forEach((item)=>{


let u=item.data();

let id=item.id;



box.innerHTML += `


<div class="glass rounded-3xl p-6">


<h2 class="text-2xl font-bold">
${u.name || "بدون اسم"}
</h2>


<p class="mt-2">
📧 ${u.email || ""}
</p>


<p>
📱 ${u.phone || ""}
</p>


<p class="text-green-400">
💰 الرصيد: ${u.balance || 0}
</p>


<p class="text-yellow-400">
⭐ النقاط: ${u.points || 0}
</p>



<div class="grid gap-3 mt-5">


<input id="balance-${id}"
type="number"
placeholder="إضافة رصيد"
class="p-3 rounded-xl bg-white/10">



<button onclick="addBalance('${id}')"
class="gold p-3 rounded-xl font-bold">

إضافة رصيد

</button>




<input id="points-${id}"
type="number"
placeholder="إضافة نقاط"
class="p-3 rounded-xl bg-white/10">



<button onclick="addPoints('${id}')"
class="gold p-3 rounded-xl font-bold">

إضافة نقاط

</button>


</div>


</div>


`;



});


}








window.addBalance=async function(id){


let value=Number(
document.getElementById("balance-"+id).value
);



if(value<=0)return;



let ref=doc(db,"users",id);

let snap=await getDoc(ref);


await updateDoc(ref,{

balance:(snap.data().balance || 0)+value

});


loadUsers();


}








window.addPoints=async function(id){


let value=Number(
document.getElementById("points-"+id).value
);



if(value<=0)return;



let ref=doc(db,"users",id);

let snap=await getDoc(ref);



await updateDoc(ref,{

points:(snap.data().points || 0)+value

});


loadUsers();


}








window.logout=function(){


signOut(auth);


location="login.html";


}


</script>


</body>

</html>
