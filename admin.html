<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - لوحة المدير</title>

<script src="https://cdn.tailwindcss.com"></script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

</style>

</head>



<body class="text-white min-h-screen">



<header class="glass p-5 flex justify-between items-center">

<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>


<button onclick="logout()" class="text-red-300">
خروج
</button>


</header>






<main class="max-w-7xl mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
👑 لوحة المدير
</h2>




<div id="users" class="space-y-5"></div>



</main>







<script type="module">


import {auth,db} from "./firebase.js";


import {
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

collection,
getDocs,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";






onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}



let adminRef=doc(db,"users",user.uid);

let adminSnap=await getDoc(adminRef);



if(!adminSnap.exists() || adminSnap.data().role!="admin"){


alert("ليس لديك صلاحية الدخول");

location="dashboard.html";

return;


}



loadUsers();


});







async function loadUsers(){



let box=document.getElementById("users");


box.innerHTML="";



let snapshot=await getDocs(collection(db,"users"));



snapshot.forEach((item)=>{



let u=item.data();


let id=item.id;




box.innerHTML += `


<div class="glass rounded-3xl p-6">


<h2 class="text-2xl font-bold mb-3">

${u.name || "بدون اسم"}

</h2>



<p>
📧 ${u.email || ""}
</p>


<p>
📱 ${u.phone || ""}
</p>


<p class="text-green-400 mt-2">

💰 الرصيد:
${u.balance || 0}

</p>


<p class="text-yellow-400">

⭐ النقاط:
${u.points || 0}

</p>





<div class="grid md:grid-cols-2 gap-3 mt-5">


<input

id="bal-${id}"

type="number"

placeholder="إضافة رصيد"

class="p-3 rounded-xl bg-white/10"


>



<button

onclick="addBalance('${id}')"

class="gold rounded-xl font-bold">

إضافة رصيد

</button>





<input

id="point-${id}"

type="number"

placeholder="إضافة نقاط"

class="p-3 rounded-xl bg-white/10"


>



<button

onclick="addPoints('${id}')"

class="gold rounded-xl font-bold">

إضافة نقاط

</button>


</div>


</div>


`;



});



}









window.addBalance=async function(id){


let value=

Number(document.getElementById("bal-"+id).value);



if(value<=0)return;



let ref=doc(db,"users",id);



let snap=await getDoc(ref);


let old=snap.data().balance || 0;



await updateDoc(ref,{

balance:old+value

});



alert("تم إضافة الرصيد");


loadUsers();


}









window.addPoints=async function(id){


let value=

Number(document.getElementById("point-"+id).value);



if(value<=0)return;



let ref=doc(db,"users",id);



let snap=await getDoc(ref);


let old=snap.data().points || 0;



await updateDoc(ref,{

points:old+value

});



alert("تم إضافة النقاط");


loadUsers();


}









window.logout=function(){


signOut(auth);


location="login.html";


}





</script>


</body>

</html>
