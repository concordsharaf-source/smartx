<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - إدارة الأعضاء</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config={
theme:{
extend:{
colors:{
gold:'#e94560',
success:'#00d09c'
}
}
}
}
</script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold-gradient{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

</style>


</head>


<body class="text-white min-h-screen">


<header class="glass p-5 flex justify-between items-center">


<h1 class="text-3xl font-black">
Smart <span class="text-gold">X</span>
</h1>


<button onclick="logout()" class="text-red-300">
خروج
</button>


</header>





<main class="max-w-7xl mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
لوحة المدير 👑
</h2>





<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">


<div class="glass rounded-2xl p-5">
<p class="text-gray-400">عدد الأعضاء</p>
<h2 id="count" class="text-3xl font-bold">
0
</h2>
</div>



<div class="glass rounded-2xl p-5">
<p class="text-gray-400">إجمالي الأرصدة</p>
<h2 id="money" class="text-3xl font-bold text-success">
0 $
</h2>
</div>



<div class="glass rounded-2xl p-5">
<p class="text-gray-400">إجمالي النقاط</p>
<h2 id="pointsTotal" class="text-3xl font-bold text-gold">
0
</h2>
</div>



<div class="glass rounded-2xl p-5">
<p class="text-gray-400">الحالة</p>
<h2 class="text-3xl">
نشط
</h2>
</div>


</div>







<input
id="search"
onkeyup="showUsers()"
placeholder="🔍 ابحث باسم المستخدم أو الهاتف"
class="w-full p-4 mb-6 rounded-xl bg-white/10">







<div class="glass rounded-3xl p-5 overflow-x-auto">


<table class="w-full text-center">


<thead>

<tr class="border-b border-white/20">

<th class="p-3">الاسم</th>

<th>الهاتف</th>

<th>البريد</th>

<th>الرصيد</th>

<th>النقاط</th>

<th>التحكم</th>

</tr>

</thead>


<tbody id="usersTable">

</tbody>


</table>


</div>



</main>







<script>


let users =
JSON.parse(localStorage.getItem("smartUsers")) || [];






function showUsers(){



let table =
document.getElementById("usersTable");

table.innerHTML="";



let search =
document.getElementById("search").value.toLowerCase();





let totalMoney=0;

let totalPoints=0;






users
.filter(user=>

user.name.toLowerCase().includes(search)
||
user.username.toLowerCase().includes(search)
||
user.phone.includes(search)

)

.forEach((user,index)=>{



totalMoney += Number(user.balance);

totalPoints += Number(user.points);





table.innerHTML += `

<tr class="border-b border-white/10">


<td class="p-3">

${user.name}

<br>

<span class="text-gray-400 text-sm">

${user.username}

</span>

</td>


<td>

${user.phone}

</td>


<td>

${user.email}

</td>


<td class="text-success">

${user.balance}$

</td>


<td class="text-gold">

${user.points}

</td>



<td>


<button

onclick="addMoney(${index})"

class="bg-green-600 px-3 py-2 rounded-lg m-1">

+ رصيد

</button>



<button

onclick="addPoints(${index})"

class="bg-yellow-600 px-3 py-2 rounded-lg m-1">

+ نقاط

</button>


</td>


</tr>

`;



});






document.getElementById("count").innerHTML=users.length;

document.getElementById("money").innerHTML=totalMoney+" $";

document.getElementById("pointsTotal").innerHTML=totalPoints;



}






function addMoney(index){



let amount =
prompt("أدخل مبلغ الإضافة");



if(amount && amount>0){


users[index].balance += Number(amount);


save();


alert("تم إضافة الرصيد");

}


}







function addPoints(index){



let points =
prompt("أدخل عدد النقاط");



if(points && points>0){


users[index].points += Number(points);


save();


alert("تم إضافة النقاط");

}


}







function save(){


localStorage.setItem(

"smartUsers",

JSON.stringify(users)

);


showUsers();


}







function logout(){

window.location="index.html";

}





showUsers();


</script>


</body>

</html>
