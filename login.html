<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - تسجيل الدخول</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}

.gold{
background:linear-gradient(135deg,#e94560,#ff6b6b);
}

</style>

</head>


<body class="min-h-screen text-white flex items-center justify-center p-5">


<div class="w-full max-w-md">


<div class="text-center mb-6">

<h1 class="text-5xl font-black">
Smart <span class="text-red-400">X</span>
</h1>

<p class="text-gray-300 mt-3">
تسجيل الدخول
</p>

</div>



<div class="glass rounded-3xl p-7">


<input id="email"
type="email"
placeholder="البريد الإلكتروني"
class="w-full p-4 mb-4 rounded-xl bg-white/10">


<input id="password"
type="password"
placeholder="كلمة المرور"
class="w-full p-4 mb-6 rounded-xl bg-white/10">


<button onclick="login()"
class="w-full py-4 rounded-xl gold font-bold">

دخول

</button>


<p class="text-center mt-5">

<a href="#" onclick="resetPassword()" class="text-green-400">

نسيت كلمة المرور؟

</a>

</p>


<p class="text-center mt-4">

ليس لديك حساب؟

<a href="register.html" class="text-red-400">
إنشاء حساب
</a>

</p>


</div>


</div>




<script type="module">


import {auth,db} from "./firebase.js";


import {

signInWithEmailAndPassword,

sendPasswordResetEmail

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,

getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





window.login = async function(){


let email =
document.getElementById("email").value.trim();


let password =
document.getElementById("password").value;



if(!email || !password){

alert("اكتب البريد وكلمة المرور");

return;

}



try{


let result = await signInWithEmailAndPassword(

auth,

email,

password

);



let uid = result.user.uid;



let userRef = doc(db,"users",uid);



let userSnap = await getDoc(userRef);





if(userSnap.exists()){


let data=userSnap.data();



console.log(data);



if(data.role && data.role.trim()=="admin"){


alert("مرحباً بك يا مدير");


window.location.href="admin.html";


}else{


window.location.href="dashboard.html";


}



}else{


alert("تم الدخول لكن بيانات المستخدم غير موجودة");

window.location.href="dashboard.html";


}




}

catch(error){


alert("خطأ في الدخول: "+error.message);


}



}







window.resetPassword = async function(){


let email =
document.getElementById("email").value.trim();



if(!email){

alert("اكتب البريد الإلكتروني أولاً");

return;

}



try{


await sendPasswordResetEmail(auth,email);


alert("تم إرسال رابط تغيير كلمة المرور إلى بريدك");


}

catch(error){


alert(error.message);


}


}




</script>



</body>

</html>
