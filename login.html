<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - تسجيل الدخول</title>


<script src="https://cdn.tailwindcss.com"></script>


<script>

tailwind.config={
theme:{
extend:{
colors:{
gold:'#e94560',
success:'#00d09c'
}
}
}
}

</script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');


*{
font-family:'Cairo',sans-serif;
}


body{

background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);

}


.glass{

background:rgba(255,255,255,.1);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.1);

}


.gold-gradient{

background:linear-gradient(135deg,#e94560,#ff6b6b);

}


input{

outline:none;

}

</style>


</head>





<body class="min-h-screen text-white flex items-center justify-center px-5">






<div class="w-full max-w-md">





<div class="text-center mb-7">


<h1 class="text-5xl font-black">

Smart

<span class="text-gold">

X

</span>

</h1>


<p class="text-gray-300 mt-3">

تسجيل الدخول إلى حسابك

</p>


</div>









<div class="glass rounded-3xl p-8">





<h2 class="text-2xl font-bold text-center mb-6">

دخول الأعضاء

</h2>







<input

id="login"

type="text"

placeholder="اسم المستخدم أو البريد الإلكتروني"

class="w-full p-4 mb-4 rounded-xl bg-white/10"

>







<input

id="password"

type="password"

placeholder="كلمة المرور"

class="w-full p-4 mb-6 rounded-xl bg-white/10"

>









<button

onclick="loginUser()"

class="w-full py-4 rounded-xl gold-gradient font-bold text-lg">

دخول

</button>








<p class="text-center mt-6">


ليس لديك حساب؟


<a href="register.html"

class="text-success font-bold">

إنشاء حساب

</a>


</p>





</div>






</div>









<script>





function loginUser(){



let loginValue =

document.getElementById("login").value.trim();



let password =

document.getElementById("password").value;






if(!loginValue || !password){


alert("أدخل بيانات الدخول");


return;


}







let users =

JSON.parse(localStorage.getItem("smartUsers")) || [];







let user =

users.find(u =>

(u.username === loginValue ||

u.email === loginValue)

&&

u.password === password

);








if(!user){


alert("بيانات الدخول غير صحيحة");


return;


}







localStorage.setItem(

"smartUser",

JSON.stringify(user)

);






alert("تم تسجيل الدخول بنجاح");



window.location="dashboard.html";





}



</script>





</body>

</html>
