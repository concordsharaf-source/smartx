<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - الملف الشخصي</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
}

.locked{
background:rgba(255,255,255,.05);
color:#aaa;
}


.avatar{
cursor:pointer;
transition:.3s;
}

.avatar:hover{
transform:scale(1.1);
}


.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.7);

z-index:50;

align-items:center;

justify-content:center;

}


.modal-box{

background:#16213e;

border-radius:25px;

padding:20px;

width:90%;

max-width:450px;

}


</style>

</head>


<body class="text-white min-h-screen">



<header class="glass p-5 flex justify-between items-center">

<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>


<a href="dashboard.html" class="text-green-400">
العودة
</a>


</header>





<main class="max-w-md mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
👤 حسابي
</h2>



<div class="glass rounded-3xl p-6">



<div class="text-center mb-6">


<img id="mainAvatar"

onclick="openAvatars()"

class="w-32 h-32 rounded-full mx-auto bg-white p-2 avatar">


<p class="mt-3 text-gray-300">
اضغط لتغيير الصورة
</p>


</div>







<label>
الاسم الكامل
</label>

<input id="name"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">






<label>
اسم المستخدم
</label>

<input id="username"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">






<label>
رقم الهاتف
</label>

<input id="phone"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">





<label>
الدولة
</label>

<input id="country"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">





<label>
نبذة
</label>

<textarea id="bio"

class="w-full p-4 mb-5 mt-2 rounded-xl bg-white/10"></textarea>








<div class="locked rounded-xl p-4 mb-3">

🔒 البريد الإلكتروني

<br>

<span id="email"></span>

</div>




<div class="locked rounded-xl p-4 mb-3">

🔒 رقم العضوية

<br>

<span id="uid"></span>

</div>





<div class="locked rounded-xl p-4 mb-3">

💰 الرصيد

<br>

<span id="balance"></span>

</div>





<div class="locked rounded-xl p-4 mb-5">

⭐ النقاط

<br>

<span id="points"></span>

</div>







<button onclick="saveProfile()"

class="w-full bg-red-500 py-4 rounded-xl font-bold">

حفظ التغييرات

</button>


<p id="message" class="text-center mt-4"></p>



</div>

</main>







<!-- نافذة الافاتارات -->


<div id="avatarModal" class="modal">


<div class="modal-box">


<h2 class="text-xl font-bold mb-4 text-center">

اختر صورتك

</h2>



<div id="avatarList"

class="grid grid-cols-4 gap-3">

</div>



<button onclick="randomAvatar()"

class="w-full mt-5 bg-yellow-600 p-3 rounded-xl">

🎲 اختيار عشوائي

</button>



<button onclick="closeAvatars()"

class="w-full mt-3 bg-gray-600 p-3 rounded-xl">

إغلاق

</button>


</div>


</div>










<script type="module">


import {auth,db} from "./firebase.js";


import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

doc,

getDoc,

updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";




let uid="";

let selectedAvatar="";



let avatars=[];



for(let i=1;i<=40;i++){


avatars.push(

"https://api.dicebear.com/9.x/personas/svg?seed=SmartX"+i

);


}




let box=document.getElementById("avatarList");



avatars.forEach((img)=>{


box.innerHTML+=`

<img src="${img}"

onclick="chooseAvatar('${img}')"

class="w-16 h-16 rounded-full bg-white p-1 avatar">

`;


});









window.openAvatars=function(){

document.getElementById("avatarModal").style.display="flex";

}




window.closeAvatars=function(){

document.getElementById("avatarModal").style.display="none";

}







window.chooseAvatar=function(img){


selectedAvatar=img;


document.getElementById("mainAvatar").src=img;


closeAvatars();


}







window.randomAvatar=function(){


let img=avatars[Math.floor(Math.random()*avatars.length)];


chooseAvatar(img);


}









onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}


uid=user.uid;



let snap=await getDoc(doc(db,"users",uid));



if(snap.exists()){


let data=snap.data();


document.getElementById("name").value=data.name || "";

document.getElementById("username").value=data.username || "";

document.getElementById("phone").value=data.phone || "";

document.getElementById("country").value=data.country || "";

document.getElementById("bio").value=data.bio || "";



document.getElementById("email").innerHTML=data.email || user.email;

document.getElementById("uid").innerHTML=uid;

document.getElementById("balance").innerHTML=(data.balance||0)+" $";

document.getElementById("points").innerHTML=data.points||0;



if(data.photoURL){

selectedAvatar=data.photoURL;

document.getElementById("mainAvatar").src=data.photoURL;


}else{


selectedAvatar=avatars[0];

document.getElementById("mainAvatar").src=avatars[0];


}


}


});










window.saveProfile=async function(){


try{


await updateDoc(doc(db,"users",uid),{


name:document.getElementById("name").value,

username:document.getElementById("username").value,

phone:document.getElementById("phone").value,

country:document.getElementById("country").value,

bio:document.getElementById("bio").value,

photoURL:selectedAvatar


});



document.getElementById("message").innerHTML="✅ تم حفظ التعديلات";


}

catch(e){


document.getElementById("message").innerHTML="❌ "+e.message;


}


}



</script>


</body>

</html>
