<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - الملف الشخصي</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#101827,#172554,#0f172a);
}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
}

.locked{
background:rgba(255,255,255,.05);
color:#a1a1aa;
}

.avatar-circle{
cursor:pointer;
transition:.3s;
}

.avatar-circle:hover{
transform:scale(1.08);
}


.modal{

display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:100;
align-items:center;
justify-content:center;

}


.modal-box{

background:#111827;
width:90%;
max-width:420px;
border-radius:25px;
padding:20px;

}


</style>

</head>



<body class="text-white min-h-screen">



<header class="glass p-5 flex justify-between items-center">


<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>


<a href="dashboard.html" class="text-green-400">
العودة
</a>


</header>





<main class="max-w-md mx-auto p-5">



<h2 class="text-3xl font-bold mb-6">
👤 الملف الشخصي
</h2>



<div class="glass rounded-3xl p-6">





<div class="text-center mb-6">


<div id="mainAvatar"

onclick="openAvatarBox()"

class="w-32 h-32 rounded-full mx-auto bg-white/20 flex items-center justify-center text-6xl avatar-circle">

👤

</div>



<p class="text-gray-300 mt-3">
اضغط لتغيير الصورة
</p>


</div>






<label>الاسم الكامل</label>

<input id="name"

class="w-full p-4 mt-2 mb-4 rounded-xl bg-white/10">






<label>اسم المستخدم</label>

<input id="username"

class="w-full p-4 mt-2 mb-4 rounded-xl bg-white/10">






<label>رقم الهاتف</label>

<input id="phone"

class="w-full p-4 mt-2 mb-4 rounded-xl bg-white/10">






<label>الدولة</label>

<input id="country"

class="w-full p-4 mt-2 mb-4 rounded-xl bg-white/10">






<label>نبذة عنك</label>

<textarea id="bio"

class="w-full p-4 mt-2 mb-5 rounded-xl bg-white/10"></textarea>







<div class="locked rounded-xl p-4 mb-3">

🔒 البريد الإلكتروني

<br>

<span id="email"></span>

</div>







<div class="locked rounded-xl p-4 mb-3">

🔒 رقم العضوية

<br>

<span id="uid"></span>

</div>







<div class="locked rounded-xl p-4 mb-3">

💰 الرصيد

<br>

<span id="balance"></span>

</div>







<div class="locked rounded-xl p-4 mb-5">

⭐ النقاط

<br>

<span id="points"></span>

</div>




<button onclick="saveProfile()"

class="w-full bg-red-500 py-4 rounded-xl font-bold">

حفظ التغييرات

</button>


<p id="message" class="text-center mt-4"></p>



</div>


</main>





<!-- نافذة اختيار الافاتار -->


<div id="avatarModal" class="modal">


<div class="modal-box">


<h2 class="text-xl font-bold text-center mb-5">
اختر الصورة الرمزية
</h2>



<div id="avatarList"

class="grid grid-cols-4 gap-4">


</div>



<button onclick="randomAvatar()"

class="w-full bg-yellow-600 p-3 rounded-xl mt-5">

🎲 اختيار عشوائي

</button>



<button onclick="closeAvatarBox()"

class="w-full bg-gray-600 p-3 rounded-xl mt-3">

إغلاق

</button>


</div>


</div>
<script type="module">


import {auth,db} from "./firebase.js";


import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



let currentUID="";

let selectedAvatar="👤";



// أفاتارات رمزية محايدة

let avatars=[

"👨‍💼",
"👩‍💼",
"🧑‍💻",
"👨‍🚀",
"👩‍🚀",
"🧔",
"👩‍💻",
"🧑‍🎓",

"🕴️",
"👨‍🔬",
"👩‍🔬",
"🧑‍🏫",

"👮",
"👷",
"🧑‍⚕️",
"👨‍🍳",

"👩‍🍳",
"🧑‍🎨",
"🤵",
"👤"

];





let avatarList=document.getElementById("avatarList");



avatars.forEach((icon)=>{


avatarList.innerHTML+=`

<div onclick="chooseAvatar('${icon}')"

class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center text-4xl cursor-pointer">

${icon}

</div>

`;

});






window.openAvatarBox=function(){

document.getElementById("avatarModal").style.display="flex";

}





window.closeAvatarBox=function(){

document.getElementById("avatarModal").style.display="none";

}





window.chooseAvatar=function(icon){


selectedAvatar=icon;


document.getElementById("mainAvatar").innerHTML=icon;


closeAvatarBox();


}







window.randomAvatar=function(){


let icon=

avatars[Math.floor(Math.random()*avatars.length)];


chooseAvatar(icon);


}









onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}



currentUID=user.uid;



let snap=await getDoc(

doc(db,"users",currentUID)

);



if(snap.exists()){


let data=snap.data();



document.getElementById("name").value=data.name || "";

document.getElementById("username").value=data.username || "";

document.getElementById("phone").value=data.phone || "";

document.getElementById("country").value=data.country || "";

document.getElementById("bio").value=data.bio || "";



document.getElementById("email").innerHTML=

data.email || user.email;



document.getElementById("uid").innerHTML=

currentUID;



document.getElementById("balance").innerHTML=

(data.balance || 0)+" $";



document.getElementById("points").innerHTML=

data.points || 0;



if(data.photoURL){

selectedAvatar=data.photoURL;

document.getElementById("mainAvatar").innerHTML=data.photoURL;

}


else{


document.getElementById("mainAvatar").innerHTML="👤";


}


}



});









window.saveProfile=async function(){



try{


await updateDoc(

doc(db,"users",currentUID),

{


name:document.getElementById("name").value,

username:document.getElementById("username").value,

phone:document.getElementById("phone").value,

country:document.getElementById("country").value,

bio:document.getElementById("bio").value,

photoURL:selectedAvatar


}

);




document.getElementById("message").innerHTML=

"✅ تم حفظ التعديلات بنجاح";


}

catch(error){


document.getElementById("message").innerHTML=

"❌ حدث خطأ: "+error.message;


}



}




</script>


</body>

</html>
