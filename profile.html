<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart X - الملف الشخصي</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*{
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
}

.locked{
background:rgba(255,255,255,.05);
color:#aaa;
}

</style>

</head>


<body class="text-white min-h-screen">


<header class="glass p-5 flex justify-between items-center">

<h1 class="text-3xl font-black">
Smart <span class="text-red-400">X</span>
</h1>

<a href="dashboard.html" class="text-green-400">
العودة
</a>

</header>





<main class="max-w-md mx-auto p-5">


<h2 class="text-3xl font-bold mb-6">
👤 حسابي
</h2>



<div class="glass rounded-3xl p-6">



<div class="text-center mb-6">


<div class="w-28 h-28 rounded-full bg-white/20 mx-auto flex items-center justify-center text-5xl">

👤

</div>


<p class="mt-3 text-gray-300">
صورة الحساب
</p>


</div>







<label>
الاسم الكامل
</label>

<input id="name"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">







<label>
اسم المستخدم
</label>

<input id="username"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">








<label>
رقم الهاتف
</label>

<input id="phone"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">







<label>
الدولة
</label>

<input id="country"

class="w-full p-4 mb-4 mt-2 rounded-xl bg-white/10">








<label>
نبذة عنك
</label>

<textarea id="bio"

class="w-full p-4 mb-5 mt-2 rounded-xl bg-white/10"></textarea>









<div class="locked rounded-xl p-4 mb-3">


🔒 البريد الإلكتروني

<br>

<span id="email"></span>


</div>







<div class="locked rounded-xl p-4 mb-3">


🔒 رقم العضوية

<br>

<span id="uid"></span>


</div>







<div class="locked rounded-xl p-4 mb-3">


💰 الرصيد

<br>

<span id="balance"></span>


</div>







<div class="locked rounded-xl p-4 mb-5">


⭐ النقاط

<br>

<span id="points"></span>


</div>








<button onclick="saveProfile()"

class="w-full bg-red-500 py-4 rounded-xl font-bold">

حفظ التغييرات

</button>



<p id="message" class="text-center mt-4"></p>



</div>


</main>








<script type="module">


import {auth,db} from "./firebase.js";


import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";




let currentUID="";






onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}



currentUID=user.uid;



let ref=doc(db,"users",currentUID);



let snap=await getDoc(ref);



if(snap.exists()){


let data=snap.data();



document.getElementById("name").value=data.name || "";

document.getElementById("username").value=data.username || "";

document.getElementById("phone").value=data.phone || "";

document.getElementById("country").value=data.country || "";

document.getElementById("bio").value=data.bio || "";



document.getElementById("email").innerHTML=data.email || user.email;

document.getElementById("uid").innerHTML=currentUID;

document.getElementById("balance").innerHTML=(data.balance || 0)+" $";

document.getElementById("points").innerHTML=data.points || 0;



}



});









window.saveProfile=async function(){



try{


await updateDoc(

doc(db,"users",currentUID),

{


name:document.getElementById("name").value,

username:document.getElementById("username").value,

phone:document.getElementById("phone").value,

country:document.getElementById("country").value,

bio:document.getElementById("bio").value


}

);



document.getElementById("message").innerHTML=

"✅ تم حفظ التعديلات بنجاح";


}

catch(error){


document.getElementById("message").innerHTML=

"❌ حدث خطأ: "+error.message;


}



}




</script>


</body>

</html>
